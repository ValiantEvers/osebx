name: Update Heatmap Data

on:
  schedule:
    - cron: '17 20 * * 0' # Runs at 20:17 UTC to avoid top-of-the-hour rate limits  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Market Data and Generate JSON
        run: python scripts/update_data.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          
          # Check if there are actually changes to save
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update market data"
            
            # Pull any changes you made manually to prevent conflicts
            git pull --rebase origin main
            
            # Push the updated JSON
            git push
          else
            echo "No changes detected in data.json. Skipping commit."
          fi
