name: Update OSEBX Heatmap Data
on:
  schedule:
    - cron: '17 20 * * 0' 
    
  workflow_dispatch: # Allow manual trigger
permissions:
  contents: write
jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run data pipeline
        run: python scripts/update_data.py

      # NEW — Step 1: pre-analysis (no API, no cost)
      - name: Build analytical brief
        run: python scripts/analyze.py data.json brief.json

      # NEW — Step 2: LLM narration with failure tolerance.
      # continue-on-error lets the workflow proceed even if narration fails;
      # the commit step will then skip insights.json and keep the previous copy.
      - name: Narrate insights
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/narrate.py brief.json insights.json
        continue-on-error: true

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only stage files that actually exist this run
          for f in data.json brief.json insights.json; do
            if [ -f "$f" ]; then
              git add "$f"
            else
              echo "Skipping missing file: $f"
            fi
          done
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore: update market data ($(date -u +%Y-%m-%d))"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
