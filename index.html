<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSEBX Company Heatmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Theme Colors */
            --bg: #0a0c10;
            --bg-elevated: #12151c;
            --border: #1f242e;
            --text-primary: #f0f2f5;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            
            /* Performance Colors */
            --gain: #10b981;
            --loss: #ef4444;
            --neutral: #64748b;

            /* GICS Sector Colors (Muted) */
            --sector-energy: #f59e0b;
            --sector-financials: #3b82f6;
            --sector-staples: #14b8a6;
            --sector-industrials: #64748b;
            --sector-materials: #f97316;
            --sector-it: #8b5cf6;
            --sector-telecom: #6366f1;
            --sector-utilities: #22c55e;
            --sector-realestate: #f43f5e;
            --sector-healthcare: #10b981;
            --sector-discretionary: #ec4899;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Layout */
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        
        /* Header & Benchmarks */
        header { margin-bottom: 2rem; }
        .title-row { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem; }
        .benchmarks { display: flex; gap: 0.75rem; margin-top: 1rem; }
        .benchmark-pill {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.85rem;
        }

        .disclaimer-banner {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        /* Controls */
        .controls-bar {
            display: flex; flex-direction: column; gap: 1.5rem;
            margin-bottom: 2rem; position: sticky; top: 0;
            background: var(--bg); z-index: 10; padding: 1rem 0;
        }

        .tabs-row { 
            display: flex; gap: 0.5rem; overflow-x: auto; 
            padding-bottom: 0.5rem; scrollbar-width: none; 
        }
        .tabs-row::-webkit-scrollbar { display: none; }
        
        .tab {
            white-space: nowrap; padding: 0.5rem 1rem;
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 0.5rem; cursor: pointer; font-size: 0.85rem;
            transition: all 0.2s ease;
        }
        .tab.active { background: var(--text-primary); color: var(--bg); font-weight: 700; border-color: var(--text-primary); }

        .search-sort-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .search-container { position: relative; flex-grow: 1; max-width: 400px; }
        input[type="text"] {
            width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
            color: white; padding: 0.75rem 1rem; border-radius: 0.5rem; outline: none;
        }
        
        .sort-container { display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 5px; }
        .sort-btn {
            background: var(--bg-elevated); border: 1px solid var(--border);
            color: var(--text-secondary); padding: 0.5rem 0.75rem; border-radius: 0.4rem;
            cursor: pointer; font-size: 0.8rem; white-space: nowrap;
        }
        .sort-btn.active { border-color: var(--accent); color: white; }

        /* Legend */
        .legend-container { display: flex; align-items: center; gap: 1rem; font-size: 0.75rem; color: var(--text-secondary); }
        .legend-bar { width: 120px; height: 8px; border-radius: 4px; background: linear-gradient(to right, var(--loss), #333, var(--gain)); }

        /* Grid & Cards */
        .grid {
            display: grid; gap: 1.25rem;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        }

        .card {
            background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: 0.75rem; overflow: hidden; transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer; position: relative; height: min-content;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* Performance Heatmap Coloring */
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: var(--color-indicator);
        }

        .card-inner { padding: 1.25rem; }
        
        /* Card Collapsed View */
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
        .company-name { font-size: 1.1rem; font-weight: 700; margin: 0; max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ticker-badge { font-size: 0.7rem; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; color: var(--text-secondary); }
        
        .sector-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; color: var(--sector-color); margin-bottom: 1rem; display: block; }
        
        .main-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .metric-group { display: flex; flex-direction: column; }
        .metric-val { font-size: 1.25rem; font-weight: 800; }
        .metric-label { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; }

        .sub-metrics { display: flex; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 0.75rem; }
        .mini-metric { display: flex; flex-direction: column; align-items: center; }
        .mini-val { font-size: 0.85rem; font-weight: 700; }
        
        /* Expanded Content */
        .expanded-area { 
            display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; 
            border-top: 1px solid var(--border);
        }
        .card.expanded .expanded-area { grid-template-rows: 1fr; }
        .expanded-inner { overflow: hidden; }
        
        .expanded-tabs { display: flex; border-bottom: 1px solid var(--border); }
        .expanded-tab { 
            flex: 1; text-align: center; padding: 0.75rem; font-size: 0.7rem; 
            text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary);
            cursor: pointer;
        }
        .expanded-tab.active { color: white; background: rgba(255,255,255,0.03); border-bottom: 2px solid var(--accent); }
        
        .tab-panel { padding: 1.25rem; display: none; }
        .tab-panel.active { display: block; }

        /* Gauges & Bars */
        .gauge-container { margin-bottom: 1rem; }
        .gauge-bar { height: 6px; background: #222; border-radius: 3px; position: relative; margin: 8px 0; }
        .gauge-marker { position: absolute; height: 12px; width: 4px; background: white; top: -3px; border-radius: 2px; }
        
        .season-grid { display: flex; gap: 2px; height: 30px; align-items: flex-end; margin-top: 10px; }
        .season-bar { flex: 1; border-radius: 1px; min-height: 2px; }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 1000;
            padding: 2rem; backdrop-filter: blur(4px);
        }
        .modal {
            background: var(--bg-elevated); border: 1px solid var(--border);
            width: 100%; max-width: 800px; max-height: 90vh; border-radius: 1rem;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 2rem; overflow-y: auto; }
        .strategy-entry { margin-bottom: 2rem; }
        .strategy-entry h4 { font-family: 'DM Sans', sans-serif; margin: 0 0 0.5rem 0; color: var(--gain); }
        .strategy-calc { font-size: 0.8rem; color: var(--text-secondary); font-style: italic; margin-top: 0.5rem; border-left: 2px solid var(--border); padding-left: 0.5rem; }

        /* Skeleton */
        .skeleton { animation: pulse 1.5s infinite ease-in-out; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 0.75rem; height: 250px; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        /* Show More */
        .load-more-container { text-align: center; margin-top: 3rem; }
        .load-more-btn {
            background: transparent; border: 1px solid var(--border); color: white;
            padding: 0.75rem 2rem; border-radius: 0.5rem; cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .search-sort-row { flex-direction: column; align-items: stretch; }
            .search-container { max-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="title-row">
            <div>
                <h1>OSEBX Company Heatmap</h1>
                <div class="mono" style="color: var(--text-secondary); font-size: 0.8rem;" id="lastUpdated">Laster markedsdata...</div>
            </div>
            <button class="tab active" style="font-weight: 500;" onclick="toggleModal(true)">Strategy Guide</button>
        </div>
        <div class="benchmarks mono" id="benchmarkContainer"></div>
    </header>

    <div class="disclaimer-banner">
        Markedsdata er forsinket og oppdateres ukentlig via Yahoo Finance. Dette dashbordet er kun til informasjonsformål og skal ikke brukes til finansielle beslutninger.
    </div>

    <div class="controls-bar">
        <div class="tabs-row" id="sectorTabs">
            <div class="tab active" data-sector="All">All Sectors</div>
        </div>
        
        <div class="search-sort-row">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Søk etter selskap eller ticker...">
            </div>
            <div class="legend-container">
                <span>Loss</span>
                <div class="legend-bar"></div>
                <span>Gain</span>
            </div>
        </div>

        <div class="sort-container" id="sortContainer">
            </div>
    </div>

    <div class="mono" id="countIndicator" style="margin-bottom: 1rem; font-size: 0.8rem; color: var(--text-secondary);"></div>

    <div class="grid" id="heatmapGrid">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>

    <div class="load-more-container" id="loadMoreContainer" style="display: none;">
        <button class="load-more-btn" id="loadMoreBtn">Show more</button>
    </div>
</div>

<div class="modal-overlay" id="strategyModal" onclick="if(event.target === this) toggleModal(false)">
    <div class="modal">
        <div class="modal-header">
            <h3>Strategy Guide & Metrics</h3>
            <button onclick="toggleModal(false)" style="background:transparent; border:none; color:white; cursor:pointer; font-size:1.5rem;">&times;</button>
        </div>
        <div class="modal-body" id="strategyContent">
            </div>
    </div>
</div>

<script>
    // --- State & Config ---
    let appData = null;
    let filteredCompanies = [];
    let visibleCount = 20;
    let currentSector = 'All';
    let currentSort = { key: 'returnsYTD', dir: -1 };

    const formatters = {
        currency: new Intl.NumberFormat('nb-NO', { style: 'currency', currency: 'NOK', notation: 'compact' }),
        percent: new Intl.NumberFormat('nb-NO', { style: 'percent', minimumFractionDigits: 1, maximumFractionDigits: 1 }),
        decimal: new Intl.NumberFormat('nb-NO', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
    };

    const sectorColors = {
        "Energy": "var(--sector-energy)",
        "Financial Services": "var(--sector-financials)",
        "Consumer Defensive": "var(--sector-staples)",
        "Industrials": "var(--sector-industrials)",
        "Basic Materials": "var(--sector-materials)",
        "Technology": "var(--sector-it)",
        "Communication Services": "var(--sector-telecom)",
        "Utilities": "var(--sector-utilities)",
        "Real Estate": "var(--sector-realestate)",
        "Healthcare": "var(--sector-healthcare)",
        "Consumer Cyclical": "var(--sector-discretionary)"
    };

    const sortMetrics = [
        { label: 'YTD', key: 'returnsYTD', def: -1 },
        { label: 'Market Cap', key: 'marketCap', def: -1 },
        { label: 'P/E', key: 'peRatio', def: 1 },
        { label: 'P/B', key: 'pbRatio', def: 1 },
        { label: 'Div Yield', key: 'dividendYield', def: -1 },
        { label: '5Y Mean Dist', key: 'meanReversion.distancePercentage', def: 1 },
        { label: 'Alpha (1Y)', key: 'alpha.oneYear', def: -1 },
        { label: 'Sharpe', key: 'sharpeRatio', def: -1 },
        { label: 'Momentum', key: 'momentumScore', def: -1 },
        { label: 'EV/EBITDA', key: 'evToEbitda', def: 1 }
    ];

    // --- Initialization ---
    async function init() {
        try {
            const response = await fetch('./data.json');
            appData = await response.json();
            
            renderBenchmarks();
            renderSectorTabs();
            renderSortButtons();
            renderStrategyGuide();
            
            document.getElementById('lastUpdated').textContent = `Sist oppdatert: ${new Date(appData.lastUpdated).toLocaleString('nb-NO')}`;
            
            updateFilters();
            
            // Events
            document.getElementById('searchInput').addEventListener('input', () => updateFilters());
            document.getElementById('loadMoreBtn').addEventListener('click', () => {
                visibleCount += 20;
                renderGrid();
            });

        } catch (err) {
            document.getElementById('heatmapGrid').innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--loss);">Kunne ikke laste data. Vennligst sjekk om data.json eksisterer.</p>`;
            console.error(err);
        }
    }

    // --- Core Logic ---
    function updateFilters() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        filteredCompanies = appData.companies.filter(c => {
            const matchesSearch = c.companyName?.toLowerCase().includes(searchTerm) || c.ticker.toLowerCase().includes(searchTerm);
            const matchesSector = currentSector === 'All' || c.sector === currentSector;
            return matchesSearch && matchesSector;
        });

        sortData();
        visibleCount = 20;
        renderGrid();
    }

    function sortData() {
        const { key, dir } = currentSort;
        filteredCompanies.sort((a, b) => {
            const valA = getNestedValue(a, key);
            const valB = getNestedValue(b, key);
            
            if (valA === null) return 1;
            if (valB === null) return -1;
            return (valA - valB) * dir;
        });
    }

    function getNestedValue(obj, path) {
        return path.split('.').reduce((prev, curr) => prev ? prev[curr] : null, obj);
    }

    // --- Rendering ---
    function renderGrid() {
        const grid = document.getElementById('heatmapGrid');
        const show = filteredCompanies.slice(0, visibleCount);
        
        grid.innerHTML = show.map(c => createCardHTML(c)).join('');
        
        const remaining = filteredCompanies.length - visibleCount;
        const loader = document.getElementById('loadMoreContainer');
        loader.style.display = remaining > 0 ? 'block' : 'none';
        document.getElementById('loadMoreBtn').textContent = `Show more (${remaining} remaining)`;
        
        document.getElementById('countIndicator').textContent = `Viser ${show.length} av ${filteredCompanies.length} selskaper`;
    }

    function createCardHTML(c) {
        const color = getHeatColor(c.returnsYTD);
        const sColor = sectorColors[c.sector] || "#666";
        
        return `
            <div class="card" id="card-${c.ticker}" onclick="toggleExpand('${c.ticker}')" style="--color-indicator: ${color}; --sector-color: ${sColor}">
                <div class="card-inner">
                    <div class="card-header">
                        <h3 class="company-name">${c.companyName || c.ticker}</h3>
                        <div class="mono ticker-badge">${c.ticker.split('.')[0]} • ${c.osebxWeight}%</div>
                    </div>
                    <span class="sector-label">${c.sector || 'N/A'}</span>
                    
                    <div class="main-metrics">
                        <div class="metric-group">
                            <span class="metric-label">YTD Return</span>
                            <span class="metric-val mono" style="color: ${color}">${formatPercent(c.returnsYTD)}</span>
                        </div>
                        <div class="metric-group">
                            <span class="metric-label">Div Yield</span>
                            <span class="metric-val mono">${c.dividendYield ? formatPercent(c.dividendYield / 100) : '—'}</span>
                        </div>
                    </div>

                    <div class="sub-metrics">
                        <div class="mini-metric"><span class="metric-label">P/E</span><span class="mini-val mono">${c.peRatio || '—'}</span></div>
                        <div class="mini-metric"><span class="metric-label">P/B</span><span class="mini-val mono">${c.pbRatio || '—'}</span></div>
                        <div class="mini-metric"><span class="metric-label">1Y Alpha</span><span class="mini-val mono" style="color: ${getHeatColor(c.alpha?.oneYear)}">${c.alpha?.oneYear ? (c.alpha.oneYear > 0 ? '+' : '') + formatPercent(c.alpha.oneYear) : '—'}</span></div>
                    </div>
                </div>

                <div class="expanded-area">
                    <div class="expanded-inner">
                        <div class="expanded-tabs">
                            <div class="expanded-tab active" onclick="event.stopPropagation(); switchTab('${c.ticker}', 1)">Perf</div>
                            <div class="expanded-tab" onclick="event.stopPropagation(); switchTab('${c.ticker}', 2)">Risk</div>
                            <div class="expanded-tab" onclick="event.stopPropagation(); switchTab('${c.ticker}', 3)">Value</div>
                        </div>

                        <div class="tab-panel active" data-tab="1">
                            <div class="main-metrics">
                                <div class="metric-group"><span class="metric-label">Sharpe Ratio</span><span class="mini-val mono">${c.sharpeRatio || '—'}</span></div>
                                <div class="metric-group"><span class="metric-label">Momentum Score</span><span class="mini-val mono">${c.momentumScore || '—'}/100</span></div>
                            </div>
                            <div class="metric-label">Historical Seasonality</div>
                            <div class="season-grid">${(c.seasonality || []).map(s => `<div class="season-bar" style="height: ${Math.abs(s || 0) * 200}px; background: ${s > 0 ? 'var(--gain)' : 'var(--loss)'}"></div>`).join('')}</div>
                        </div>

                        <div class="tab-panel" data-tab="2">
                            <div class="metric-label">Max Drawdown (1Y)</div>
                            <div class="gauge-container"><div class="gauge-bar"><div class="gauge-marker" style="left: ${Math.abs(c.maxDrawdown || 0) * 100}%"></div></div><div class="mono" style="font-size: 0.7rem">${formatPercent(c.maxDrawdown)}</div></div>
                            <div class="sub-metrics">
                                <div class="mini-metric"><span class="metric-label">Correlation</span><span class="mini-val mono">${c.correlationToOSEBX || '—'}</span></div>
                                <div class="mini-metric"><span class="metric-label">Vol Pctl</span><span class="mini-val mono">${c.volatilityPercentile || '—'}%</span></div>
                            </div>
                        </div>

                        <div class="tab-panel" data-tab="3">
                            <div class="metric-group"><span class="metric-label">Market Cap</span><span class="mini-val mono">${c.marketCap ? formatters.currency.format(c.marketCap) : '—'}</span></div>
                            <div class="sub-metrics" style="margin-top: 10px;">
                                <div class="mini-metric"><span class="metric-label">EV/EBITDA</span><span class="mini-val mono">${c.evToEbitda || '—'}</span></div>
                                <div class="mini-metric"><span class="metric-label">Earnings Yield</span><span class="mini-val mono">${c.earningsYield ? formatters.decimal.format(c.earningsYield) + '%' : '—'}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    // --- Helpers ---
    function getHeatColor(val) {
        if (val === null || val === undefined) return 'var(--neutral)';
        if (val > 0) return `rgba(16, 185, 129, ${Math.min(0.2 + val * 2, 1)})`;
        if (val < 0) return `rgba(239, 68, 68, ${Math.min(0.2 + Math.abs(val) * 2, 1)})`;
        return 'var(--neutral)';
    }

    function formatPercent(val) {
        if (val === null) return '—';
        return (val * 100).toFixed(1) + '%';
    }

    function toggleExpand(ticker) {
        const card = document.getElementById(`card-${ticker}`);
        card.classList.toggle('expanded');
    }

    function switchTab(ticker, tabIdx) {
        const card = document.getElementById(`card-${ticker}`);
        const tabs = card.querySelectorAll('.expanded-tab');
        const panels = card.querySelectorAll('.tab-panel');
        
        tabs.forEach((t, i) => t.classList.toggle('active', i === tabIdx - 1));
        panels.forEach((p, i) => p.classList.toggle('active', i === tabIdx - 1));
    }

    function renderBenchmarks() {
        const container = document.getElementById('benchmarkContainer');
        container.innerHTML = Object.entries(appData.benchmarks).map(([key, val]) => `
            <div class="benchmark-pill">
                ${key}: <span style="color: ${val > 0 ? 'var(--gain)' : 'var(--loss)'}">${formatPercent(val)}</span>
            </div>
        `).join('');
    }

    function renderSectorTabs() {
        const container = document.getElementById('sectorTabs');
        const sectors = Object.keys(appData.sectorSummary);
        
        container.innerHTML = `<div class="tab active" data-sector="All">All Sectors</div>` + 
            sectors.map(s => {
                const data = appData.sectorSummary[s];
                const color = getHeatColor(data.averageYTD);
                return `<div class="tab" data-sector="${s}">${s} <span class="mono" style="font-size: 0.7rem; color: ${color}">${formatPercent(data.averageYTD)}</span></div>`;
            }).join('');

        container.querySelectorAll('.tab').forEach(t => {
            t.addEventListener('click', () => {
                container.querySelector('.active').classList.remove('active');
                t.classList.add('active');
                currentSector = t.dataset.sector;
                updateFilters();
            });
        });
    }

    function renderSortButtons() {
        const container = document.getElementById('sortContainer');
        container.innerHTML = sortMetrics.map(m => `
            <button class="sort-btn ${currentSort.key === m.key ? 'active' : ''}" data-key="${m.key}" data-def="${m.def}">
                ${m.label} ${currentSort.key === m.key ? (currentSort.dir === 1 ? '↑' : '↓') : ''}
            </button>
        `).join('');

        container.querySelectorAll('.sort-btn').forEach(b => {
            b.addEventListener('click', () => {
                const key = b.dataset.key;
                const def = parseInt(b.dataset.def);
                
                if (currentSort.key === key) {
                    currentSort.dir *= -1;
                } else {
                    currentSort.key = key;
                    currentSort.dir = def;
                }
                
                renderSortButtons();
                updateFilters();
            });
        });
    }

    function toggleModal(show) {
        document.getElementById('strategyModal').style.display = show ? 'flex' : 'none';
    }

    function renderStrategyGuide() {
        // This is where the long definitions from the prompt go
        const content = document.getElementById('strategyContent');
        const definitions = [
            { t: "YTD Return", d: "Avkastning siden 1. januar i år.", c: "(Dagens pris - Pris 1. jan) / Pris 1. jan" },
            { t: "Alpha (Relative Strength)", d: "Viser om en aksje slår indeksen (OSEBX). Positiv alpha betyr meravkastning.", c: "Aksjeavkastning - Indeksavkastning" },
            { t: "Sharpe Ratio", d: "Mål på risikojustert avkastning. Høyere er bedre.", c: "(Avkastning - Risikofri rente) / Volatilitet" },
            { t: "Mean Reversion", d: "Avstand fra 5-års glidende gjennomsnitt. Indikerer om aksjen er strukket eller presset.", c: "(Pris - 5Y SMA) / 5Y SMA" }
        ];
        
        content.innerHTML = definitions.map(item => `
            <div class="strategy-entry">
                <h4>${item.t}</h4>
                <p>${item.d}</p>
                <div class="strategy-calc">${item.c}</div>
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
